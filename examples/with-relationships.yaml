version: "3.1.0"
apiVersion: "v3.1.0"
kind: "DataContract"
id: "relationships-contract"
name: "relationships_contract"
status: "active"

schema:
  - name: "orders"
    logicalType: "object"
    properties:
      - name: "customer_id"
        logicalType: "string"
        required: true
      - name: "order_id"
        logicalType: "string"
        required: true
    relationships:
      - type: "foreignKey"
        from: "orders.customer_id"
        to: "customers.customer_id"
